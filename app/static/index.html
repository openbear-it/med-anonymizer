<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Med-Anonymizer — Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --blue-deep: #1e3a5f;
      --blue-mid:  #2563eb;
      --blue-light:#dbeafe;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    textarea, #output-area { font-family: 'Courier New', Courier, monospace; font-size: 0.82rem; line-height: 1.5; }

    /* Tab active */
    .tab-btn         { color: #6b7280; border-bottom: 2px solid transparent; transition: all .15s; }
    .tab-btn.active  { color: #1e40af; border-bottom-color: #2563eb; font-weight: 700; }
    .tab-btn:hover:not(.active) { color: #374151; }

    /* Entity badges in legend */
    .badge { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:999px; font-size:.7rem; font-weight:600; }

    /* Entity type colors */
    .ec-name        { background:#dbeafe; color:#1e40af; }
    .ec-date        { background:#ede9fe; color:#6d28d9; }
    .ec-ssn         { background:#fee2e2; color:#991b1b; }
    .ec-address     { background:#fed7aa; color:#9a3412; }
    .ec-contact     { background:#d1fae5; color:#065f46; }
    .ec-id          { background:#fef9c3; color:#854d0e; }
    .ec-org         { background:#e0e7ff; color:#3730a3; }
    .ec-other       { background:#f3f4f6; color:#374151; }

    /* Spinner */
    .spin { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar thin */
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:4px; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

<!-- ── Header ───────────────────────────────────────────────────────────── -->
<header class="bg-gradient-to-r from-[#1e3a5f] to-[#1d4ed8] text-white shadow-lg sticky top-0 z-50">
  <div class="max-w-screen-xl mx-auto px-5 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-3xl" aria-hidden="true">🏥</span>
      <div>
        <p class="text-lg font-extrabold tracking-tight leading-none">Med-Anonymizer</p>
        <p class="text-blue-200 text-[11px] leading-none mt-0.5">De-identificazione clinica AI · OpenMed</p>
      </div>
    </div>
    <nav class="flex gap-1 text-sm">
      <a href="/ui"   class="bg-white/20 px-3 py-1.5 rounded-lg font-semibold">🔧 Test</a>
      <a href="/info" class="hover:bg-white/15 px-3 py-1.5 rounded-lg transition">ℹ️ Info</a>
      <a href="/docs" target="_blank" class="hover:bg-white/15 px-3 py-1.5 rounded-lg transition">📖 Swagger</a>
      <a href="/redoc" target="_blank" class="hover:bg-white/15 px-3 py-1.5 rounded-lg transition">📄 ReDoc</a>
    </nav>
  </div>
</header>

<!-- ── Main ─────────────────────────────────────────────────────────────── -->
<main class="max-w-screen-xl mx-auto px-5 py-6 space-y-4">

  <!-- Tabs -->
  <div class="flex gap-6 border-b border-slate-200 bg-white px-4 rounded-t-xl shadow-sm">
    <button class="tab-btn active py-3 text-sm" onclick="setTab('text')" id="tab-text">📄 Testo libero</button>
    <button class="tab-btn py-3 text-sm" onclick="setTab('fhir')" id="tab-fhir">🔷 FHIR JSON</button>
    <button class="tab-btn py-3 text-sm" onclick="setTab('hl7')"  id="tab-hl7">🔗 HL7 v2</button>
  </div>

  <!-- Options bar -->
  <div class="bg-white rounded-xl shadow-sm px-5 py-4 flex flex-wrap gap-5 items-end">
    <div class="flex flex-col gap-1">
      <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Modello AI</label>
      <select id="sel-model" class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
        <option value="italian-superclinical-base">⚡ SuperClinical Base 184M — veloce (default)</option>
        <option value="italian-bigmed-large">🏥 BigMed Large 560M — italiano clinico</option>
        <option value="italian-superclinical-large">🎯 SuperClinical Large 434M — massima precisione</option>
      </select>
    </div>

    <div class="flex flex-col gap-1" id="wrap-format">
      <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Placeholder</label>
      <select id="sel-format" class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
        <option value="tag">[ENTITY_TYPE] — mostra il tipo</option>
        <option value="redacted">[REDACTED] — generico</option>
      </select>
    </div>

    <div class="flex flex-col gap-1 min-w-[140px]">
      <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">
        Confidenza min: <span id="lbl-conf" class="text-blue-600">0.70</span>
      </label>
      <input type="range" id="rng-conf" min="0" max="1" step="0.05" value="0.70"
             oninput="document.getElementById('lbl-conf').textContent=parseFloat(this.value).toFixed(2)"
             class="accent-blue-600 mt-1" />
    </div>

    <button id="btn-run" onclick="doAnonymize()"
            class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 active:scale-95
                   text-white font-bold px-6 py-2.5 rounded-xl text-sm transition-all
                   disabled:opacity-40 disabled:cursor-not-allowed shadow">
      <svg id="ico-bolt" class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
        <path d="M11 3L4 12h7l-2 5 9-10h-7l2-4z"/>
      </svg>
      <svg id="ico-spin" class="w-4 h-4 spin hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" d="M12 3v3m6.36 1.64-2.12 2.12M21 12h-3m-1.64 6.36-2.12-2.12M12 21v-3m-6.36-1.64 2.12-2.12M3 12h3m1.64-6.36 2.12 2.12"/>
      </svg>
      <span id="lbl-btn">Anonimizza</span>
    </button>

    <button onclick="loadExample()"
            class="text-sm text-blue-600 hover:text-blue-800 underline underline-offset-2 transition">
      Carica esempio
    </button>
  </div>

  <!-- Panels -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

    <!-- Input panel -->
    <div class="bg-white rounded-xl shadow-sm flex flex-col overflow-hidden">
      <div class="flex items-center justify-between px-4 py-2 bg-slate-50 border-b border-slate-100">
        <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">INPUT</span>
        <span id="lbl-chars" class="text-xs text-slate-400">0 caratteri</span>
      </div>
      <textarea id="txt-input" rows="20"
                placeholder="Incolla qui il testo clinico da anonimizzare… (Ctrl+Enter per avviare)"
                class="flex-1 p-4 resize-none focus:outline-none text-slate-700 min-h-[320px]"
                oninput="onInputChange()"></textarea>
    </div>

    <!-- Output panel -->
    <div class="bg-white rounded-xl shadow-sm flex flex-col overflow-hidden">
      <div class="flex items-center justify-between px-4 py-2 bg-slate-50 border-b border-slate-100">
        <div class="flex items-center gap-2">
          <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">OUTPUT</span>
          <span id="badge-count" class="hidden badge ec-name text-[11px]"></span>
          <span id="badge-time"  class="hidden badge ec-other text-[11px]"></span>
        </div>
        <button id="btn-copy" onclick="copyOutput()"
                class="hidden text-xs text-blue-600 hover:text-blue-800 transition font-medium">
          📋 Copia
        </button>
      </div>
      <div id="output-area" class="flex-1 p-4 overflow-auto min-h-[320px] text-slate-700 whitespace-pre-wrap">
        <span class="text-slate-300 italic text-xs">Il risultato anonimizzato apparirà qui…</span>
      </div>
      <!-- Entity legend -->
      <div id="legend" class="px-4 py-2 border-t border-slate-100 flex flex-wrap gap-1.5 min-h-[36px]"></div>
    </div>
  </div>

  <!-- Error box -->
  <div id="err-box" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-xl px-5 py-3 text-sm"></div>

</main>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let currentTab = 'text';

const ENTITY_CLASS = {
  name: 'ec-name',
  given_name: 'ec-name', last_name: 'ec-name', full_name: 'ec-name', suffix: 'ec-name', prefix: 'ec-name',
  date_of_birth: 'ec-date', date: 'ec-date', date_time: 'ec-date', time: 'ec-date', age: 'ec-date',
  ssn: 'ec-ssn', medical_record_number: 'ec-ssn', tax_id: 'ec-ssn', health_plan_beneficiary_number: 'ec-ssn',
  national_id: 'ec-ssn', passport_number: 'ec-ssn', drivers_license: 'ec-ssn',
  address: 'ec-address', city: 'ec-address', state: 'ec-address', zip_code: 'ec-address',
  country: 'ec-address', geographic_coordinates: 'ec-address',
  phone_number: 'ec-contact', email: 'ec-contact', url: 'ec-contact', fax_number: 'ec-contact',
  account_number: 'ec-id', credit_debit_card: 'ec-id', bank_account: 'ec-id',
  ip_address: 'ec-id', mac_address: 'ec-id', username: 'ec-id', biometric_identifier: 'ec-id',
  vehicle_id: 'ec-id', device_id: 'ec-id', license_plate: 'ec-id', unique_identifier: 'ec-id',
  organization: 'ec-org',
};

function entityClass(type) {
  return ENTITY_CLASS[type.toLowerCase()] || 'ec-other';
}

// ── Examples ───────────────────────────────────────────────────────────────
const EXAMPLES = {
  text: `Paziente: Mario Rossi, nato il 15/03/1965, C.F.: RSSMRA65C15D612Z.
Numero cartella clinica: MRN-2024-98765.

Medico curante: Dott.ssa Anna Ferrari — Ospedale Santa Maria Nuova, Firenze.
Telefono studio: 055-123456 | Email: a.ferrari@ospedale.fi.it

Indirizzo paziente: Via Roma 42, 50100 Firenze FI.
Contatto emergenza: Laura Rossi (moglie), tel. 333-9876543.

Il paziente si è presentato in data 10/04/2024 per dolori toracici ricorrenti.
EGA: pH 7.42, pCO2 38 mmHg, pO2 92 mmHg. ECG: RS, freq. 72 bpm.
Diagnosi: insufficienza mitralica di grado lieve. Terapia: Ramipril 5 mg/die.
Follow-up previsto: 15/05/2024 ore 10:30 — Ambulatorio Cardiologia.`,

  fhir: JSON.stringify({
    resourceType: "Patient",
    id: "patient-001",
    identifier: [{ system: "http://hospital.it/mrn", value: "MRN-2024-98765" }],
    name: [{ use: "official", family: "Rossi", given: ["Mario", "Luigi"] }],
    birthDate: "1965-03-15",
    gender: "male",
    address: [{
      use: "home",
      line: ["Via Roma 42"],
      city: "Firenze",
      state: "FI",
      postalCode: "50100",
      country: "IT"
    }],
    telecom: [
      { system: "phone", value: "055-123456" },
      { system: "email", value: "mario.rossi@email.it" }
    ],
    contact: [{
      name: { family: "Rossi", given: ["Laura"] },
      telecom: [{ system: "phone", value: "333-9876543" }]
    }]
  }, null, 2),

  hl7: `MSH|^~\\&|HIS|OSPEDALE|LAB|LABORATORIO|20240410120000||ADT^A01|MSG12345|P|2.5
EVN|A01|20240410120000|||
PID|1||MRN-2024-98765^^^OSPEDALE^MR||Rossi^Mario^Luigi||19650315|M|||Via Roma 42^^Firenze^FI^50100||055-123456~~~333-9876543|055-123456||M||
NK1|1|Rossi^Laura|SP|Via Roma 42^^Firenze^FI^50100|333-9876543
PV1|1|I|Cardio^001^A||||98765^Ferrari^Anna|||||||||||MRN-2024-98765`
};

// ── Tab management ─────────────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  ['text','fhir','hl7'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
  document.getElementById('wrap-format').style.display = tab === 'fhir' ? 'none' : '';
  const ph = {
    text: 'Incolla il testo clinico da anonimizzare… (Ctrl+Enter per avviare)',
    fhir: 'Incolla la risorsa FHIR in formato JSON…',
    hl7:  'Incolla il messaggio HL7 v2 da anonimizzare…'
  };
  document.getElementById('txt-input').placeholder = ph[tab];
  resetOutput();
}

function loadExample() {
  document.getElementById('txt-input').value = EXAMPLES[currentTab];
  onInputChange();
  resetOutput();
}

function onInputChange() {
  const n = document.getElementById('txt-input').value.length;
  document.getElementById('lbl-chars').textContent = n.toLocaleString('it') + ' caratteri';
}

// ── Reset output ───────────────────────────────────────────────────────────
function resetOutput() {
  document.getElementById('output-area').innerHTML =
    '<span class="text-slate-300 italic text-xs">Il risultato anonimizzato apparirà qui…</span>';
  document.getElementById('badge-count').classList.add('hidden');
  document.getElementById('badge-time').classList.add('hidden');
  document.getElementById('btn-copy').classList.add('hidden');
  document.getElementById('legend').innerHTML = '';
  document.getElementById('err-box').classList.add('hidden');
}

// ── Anonymize ──────────────────────────────────────────────────────────────
async function doAnonymize() {
  const text = document.getElementById('txt-input').value.trim();
  if (!text) return;

  const model   = document.getElementById('sel-model').value;
  const fmt     = document.getElementById('sel-format').value;
  const minConf = parseFloat(document.getElementById('rng-conf').value);

  setLoading(true);
  resetOutput();

  try {
    let url, body;
    if (currentTab === 'text') {
      url  = '/api/v1/anonymize/text';
      body = { text, model, placeholder_format: fmt, min_confidence: minConf };
    } else if (currentTab === 'fhir') {
      url = '/api/v1/anonymize/fhir';
      let resource;
      try { resource = JSON.parse(text); }
      catch (e) { throw new Error('JSON FHIR non valido: ' + e.message); }
      body = { resource, model, min_confidence: minConf };
    } else {
      url  = '/api/v1/anonymize/hl7';
      // HL7 uses model key directly
      body = { message: text, model, placeholder_format: fmt, min_confidence: minConf };
    }

    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: `HTTP ${resp.status}` }));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }

    displayResult(await resp.json());
  } catch (e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  const btn = document.getElementById('btn-run');
  btn.disabled = on;
  document.getElementById('ico-bolt').classList.toggle('hidden', on);
  document.getElementById('ico-spin').classList.toggle('hidden', !on);
  document.getElementById('lbl-btn').textContent = on ? 'Elaborazione…' : 'Anonimizza';
}

function displayResult(data) {
  const isFhir   = currentTab === 'fhir';
  const outText  = isFhir
    ? JSON.stringify(data.anonymized_resource, null, 2)
    : data.anonymized;
  const entities = data.entities || [];
  const count    = data.entity_count ?? entities.length;
  const ms       = data.processing_time_ms;

  // Output
  document.getElementById('output-area').textContent = outText;

  // Badges
  const bc = document.getElementById('badge-count');
  bc.textContent = `${count} ${count === 1 ? 'entità' : 'entità'} rilevate`;
  bc.classList.remove('hidden');

  const bt = document.getElementById('badge-time');
  bt.textContent = `⏱ ${Math.round(ms)} ms`;
  bt.classList.remove('hidden');

  document.getElementById('btn-copy').classList.remove('hidden');

  // Legend
  const typeCounts = {};
  entities.forEach(e => { typeCounts[e.entity_type] = (typeCounts[e.entity_type] || 0) + 1; });
  const legend = document.getElementById('legend');
  legend.innerHTML = Object.entries(typeCounts)
    .sort((a, b) => b[1] - a[1])
    .map(([type, cnt]) =>
      `<span class="badge ${entityClass(type)}">${type}&nbsp;×${cnt}</span>`
    ).join('');
}

function showError(msg) {
  const box = document.getElementById('err-box');
  box.textContent = '❌ ' + msg;
  box.classList.remove('hidden');
}

function copyOutput() {
  const text = document.getElementById('output-area').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✅ Copiato!';
    setTimeout(() => { btn.textContent = '📋 Copia'; }, 2000);
  });
}

// Ctrl+Enter shortcut
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') doAnonymize();
});
</script>
</body>
</html>
